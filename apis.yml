aid: crystallize
name: Crystallize
description: >-
  Crystallize is a headless product information management (PIM) and commerce
  platform built around a set of GraphQL APIs. It separates product
  storytelling from the commerce engine, exposing a Catalogue API for reading
  structured product data, a Discovery (Search) API for browse and search, a
  Shop API for cart and checkout, an Order/Subscription API, and a Core/PIM
  API for managing shapes, items, and tenants.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/crystallize/refs/heads/main/apis.yml
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
tags:
  - Commerce
  - Headless Commerce
  - Product Information Management
  - PIM
  - GraphQL
  - Catalog
  - Search
  - Orders
  - Subscriptions
apis:
  - aid: crystallize:catalogue-api
    name: Crystallize Catalogue API
    description: >-
      Read-optimized GraphQL API for fetching structured product data, shapes,
      topics, price variants, stock, and rich content for storefronts. Queries
      are scoped to a tenant identifier and return path-based catalogue
      content.
    humanURL: https://crystallize.com/learn/developer-guides/catalogue-api
    baseURL: https://api.crystallize.com
    tags:
      - GraphQL
      - Catalogue
      - Products
      - Content
    properties:
      - type: Documentation
        url: https://crystallize.com/learn/developer-guides/catalogue-api
      - type: Playground
        url: https://crystallize.com/learn/developer-guides/query-explorer/graphql-playground
  - aid: crystallize:discovery-search-api
    name: Crystallize Discovery / Search API
    description: >-
      Semantic GraphQL API combining browse, search, and autocomplete in a
      single endpoint. Supports filtering, faceting, ranking, and rich product
      discovery experiences for storefronts.
    humanURL: https://crystallize.com/learn/developer-guides/api-overview
    baseURL: https://api.crystallize.com
    tags:
      - GraphQL
      - Search
      - Discovery
      - Autocomplete
      - Browse
    properties:
      - type: Documentation
        url: https://crystallize.com/learn/developer-guides/api-overview
  - aid: crystallize:shop-api
    name: Crystallize Shop API
    description: >-
      Edge-distributed GraphQL API for cart, promotions, and checkout flows.
      Optimized for low-latency storefront writes during the buying journey.
    humanURL: https://crystallize.com/docs/developer/apis/shop-api
    baseURL: https://shop-api.crystallize.com
    tags:
      - GraphQL
      - Cart
      - Checkout
      - Promotions
    properties:
      - type: Documentation
        url: https://crystallize.com/docs/developer/apis/shop-api
  - aid: crystallize:order-api
    name: Crystallize Order API
    description: >-
      GraphQL API for creating, reading, and managing orders linked to a
      Crystallize tenant. Used by storefronts and back-office tooling to
      persist completed transactions.
    humanURL: https://crystallize.com/learn/developer-guides/order-api
    baseURL: https://api.crystallize.com
    tags:
      - GraphQL
      - Orders
    properties:
      - type: Documentation
        url: https://crystallize.com/learn/developer-guides/order-api
  - aid: crystallize:subscription-api
    name: Crystallize Subscription API
    description: >-
      GraphQL API for managing recurring orders, subscription contracts, and
      renewal events for Crystallize-powered commerce experiences.
    humanURL: https://crystallize.com/learn/developer-guides/api-overview
    baseURL: https://api.crystallize.com
    tags:
      - GraphQL
      - Subscriptions
      - Recurring Billing
    properties:
      - type: Documentation
        url: https://crystallize.com/learn/developer-guides/api-overview
  - aid: crystallize:core-pim-api
    name: Crystallize Core / PIM API
    description: >-
      Read/write GraphQL API for managing the product information model:
      shapes, items, topics, language, price variants, stock locations, and
      tenant configuration. Powers PIM tooling and back-office automation.
    humanURL: https://crystallize.com/docs/developer/apis
    baseURL: https://pim.crystallize.com/graphql
    tags:
      - GraphQL
      - PIM
      - Core
      - Shapes
      - Tenants
    properties:
      - type: Documentation
        url: https://crystallize.com/docs/developer/apis
